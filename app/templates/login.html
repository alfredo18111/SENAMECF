<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sesión</title>
    <style>
    body{
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;

        display:flex;
        justify-content:center;
        align-items:center;

        height:100vh;
    }

    .login-container{
        background:white;
        padding:40px;
        border-radius:10px;

        box-shadow:0px 0px 10px rgba(0,0,0,0.2);

        text-align:center;
        width:350px;
    }

    .login-container input{
        width:90%;
        padding:10px;
    }

    .login-container button{
        width:95%;
        padding:10px;
    }
    </style>
</head>
<body>

    <div class="login-container">
    <h1>SENAMECF</h1>
    <P>Sistema de Bienestar Social</p>

    <form method="POST">

        <label>Usuario:</label><br>
        <input type="text" name="usuario" required>
        <br><br>

        <label>Clave:</label><br>
        <input type="password" name="clave" required>
        <br><br>

        <button type="submit">
            Ingresar
        </button>

    </form>
    </div>

</body>
</html>
